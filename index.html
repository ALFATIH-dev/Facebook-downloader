<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Downloader Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1877f2, #0d47a1);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  outline: none;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #00c853;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00a844;
}

#result {
  margin-top: 20px;
}

a {
  display: block;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
}

.loading {
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {opacity: 0.5;}
  50% {opacity: 1;}
  100% {opacity: 0.5;}
}
</style>
</head>

<body>

<div class="container">
  <h1>FB Downloader Pro 🚀</h1>
  <p>Tempel link video Facebook</p>

  <input type="text" id="url" placeholder="https://facebook.com/...">
  <button onclick="downloadVideo()">Download</button>

  <div id="result"></div>
</div>

<script>
async function downloadVideo() {
  let url = document.getElementById("url").value;
  let result = document.getElementById("result");

  if (!url) {
    result.innerHTML = "❌ Masukkan link dulu!";
    return;
  }

  result.innerHTML = "<div class='loading'>⏳ Mengambil video...</div>";

  try {
    let api = "https://api.allorigins.win/raw?url=" + encodeURIComponent(
      "https://fdownloader.net/api/ajaxSearch?url=" + url
    );

    let res = await fetch(api);
    let text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      result.innerHTML = "❌ Link tidak valid / API error";
      return;
    }

    if (!data.links || data.links.length === 0) {
      result.innerHTML = "❌ Video tidak ditemukan";
      return;
    }

    let html = "<h3>Download Video:</h3>";
    data.links.forEach(link => {
      html += `<a href="${link.url}" target="_blank">Download ${link.quality}</a>`;
    });

    result.innerHTML = html;

  } catch (err) {
    result.innerHTML = "❌ Error: " + err;
  }
}
</script>

</body>
</html>
