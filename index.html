<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Facebook Video Downloader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Facebook Video Downloader</h1>
    <p>Tempel link video Facebook di bawah</p>

    <input type="text" id="url" placeholder="Masukkan URL Facebook...">
    <button onclick="downloadVideo()">Download</button>

    <div id="result"></div>
  </div>

  <script>
    async function downloadVideo() {
      let url = document.getElementById("url").value;
      let result = document.getElementById("result");

      if (!url) {
        result.innerHTML = "<p style='color:red;'>Masukkan URL dulu!</p>";
        return;
      }

      result.innerHTML = "Loading...";

      try {
        let response = await fetch(`https://api.allorigins.win/raw?url=https://fdownloader.net/api/ajaxSearch?url=${encodeURIComponent(url)}`);
        let data = await response.json();

        if (data.links) {
          let html = "<h3>Download:</h3>";
          data.links.forEach(link => {
            html += `<a href="${link.url}" target="_blank">${link.quality}</a><br>`;
          });
          result.innerHTML = html;
        } else {
          result.innerHTML = "Gagal mengambil video.";
        }
      } catch (error) {
        result.innerHTML = "Error: " + error;
      }
    }
  </script>

</body>
</html>
